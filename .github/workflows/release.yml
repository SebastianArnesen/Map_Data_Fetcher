name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pyinstaller>=6.20.0"

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Verify tag matches version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = (Select-String -Path .\app\__init__.py -Pattern '^__version__\s*=\s*"(.*)"' | Select-Object -First 1).Matches.Groups[1].Value
          if (-not $version) { throw "Could not read __version__ from app/__init__.py" }
          $expected = "v$version"
          Write-Host "Tag: $tag  App: $version  Expected tag: $expected"
          if ($tag -ne $expected) {
            throw "Tag '$tag' does not match __version__ '$version'. Use tag '$expected'."
          }

      - name: Build exe and installer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          .\build_exe.ps1
          .\build_installer.ps1
          Get-ChildItem dist\GeonorgeDatasets.exe, dist\GeonorgeDatasetsSetup.exe | Format-Table Name, Length

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/GeonorgeDatasets.exe
            dist/GeonorgeDatasetsSetup.exe
          generate_release_notes: true
          fail_on_unmatched_files: true
          overwrite_files: true
