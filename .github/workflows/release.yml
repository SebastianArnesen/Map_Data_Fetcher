name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: windows
            upload_glob: |
              dist/GeonorgeDatasets.exe
              dist/GeonorgeDatasetsSetup.exe
          - os: macos-latest
            artifact_name: macos
            upload_glob: dist/GeonorgeDatasets.dmg
          - os: ubuntu-latest
            artifact_name: linux
            upload_glob: dist/GeonorgeDatasets-*-linux-*.tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0 libxcb-cursor0 libproj-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pyinstaller>=6.20.0"

      - name: Install Inno Setup
        if: runner.os == 'Windows'
        run: choco install innosetup -y --no-progress

      - name: Verify tag matches version
        run: python scripts/verify_release_tag.py

      - name: Build Windows exe and installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          .\build_exe.ps1
          .\build_installer.ps1
          Get-ChildItem dist\GeonorgeDatasets.exe, dist\GeonorgeDatasetsSetup.exe | Format-Table Name, Length

      - name: Build macOS app and DMG
        if: runner.os == 'macOS'
        run: |
          chmod +x build_exe.sh build_dmg.sh
          ./build_exe.sh
          ls -lh dist/GeonorgeDatasets.app dist/GeonorgeDatasets.dmg

      - name: Build Linux tarball
        if: runner.os == 'Linux'
        run: |
          chmod +x build_exe.sh
          ./build_exe.sh
          ls -lh dist/GeonorgeDatasets dist/GeonorgeDatasets-*-linux-*.tar.gz

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact_name }}
          path: ${{ matrix.upload_glob }}
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List release files
        run: find artifacts -type f -print -exec ls -lh {} \;

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: true
          overwrite_files: true
