name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pyinstaller>=6.20.0"

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $candidates = @(
            "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
            "${env:ProgramFiles(x86)}\Inno Setup 7\ISCC.exe",
            "$env:ProgramFiles\Inno Setup 6\ISCC.exe",
            "$env:ProgramFiles\Inno Setup 7\ISCC.exe",
            "$env:ProgramData\chocolatey\lib\InnoSetup\tools\ISCC.exe",
            "$env:ProgramData\chocolatey\lib\innosetup\tools\ISCC.exe"
          )
          foreach ($iscc in $candidates) {
            if (Test-Path $iscc) {
              $dir = Split-Path $iscc -Parent
              echo $dir >> $env:GITHUB_PATH
              Write-Host "Inno Setup: $iscc"
              exit 0
            }
          }
          throw "ISCC.exe not found after Inno Setup install"

      - name: Verify build inputs
        shell: pwsh
        run: |
          if (-not (Test-Path assets\appIcon.ico)) {
            throw "Missing assets/appIcon.ico (must be committed for CI builds)."
          }

      - name: Verify tag matches app version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $line = Select-String -Path .\app\__init__.py -Pattern '^__version__\s*=\s*"(.*)"' | Select-Object -First 1
          if (-not $line) { throw "Could not read __version__ from app/__init__.py" }
          $version = $line.Matches[0].Groups[1].Value
          $expected = "v$version"
          Write-Host "Git tag:     $tag"
          Write-Host "App version: $version (expected tag $expected)"
          if ($tag -ne $expected) {
            throw "Tag '$tag' does not match app/__init__.py __version__ '$version'. Bump __version__ and use tag '$expected', or retag after fixing."
          }

      - name: Build executable
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          .\build_exe.ps1
          if (-not (Test-Path dist\GeonorgeDatasets.exe)) {
            throw "PyInstaller did not produce dist\GeonorgeDatasets.exe"
          }

      - name: Build installer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          .\build_installer.ps1
          if (-not (Test-Path dist\GeonorgeDatasetsSetup.exe)) {
            throw "Inno Setup did not produce dist\GeonorgeDatasetsSetup.exe"
          }

      - name: Verify artifacts
        shell: pwsh
        run: |
          Get-ChildItem dist\GeonorgeDatasets.exe, dist\GeonorgeDatasetsSetup.exe | Format-Table Name, Length

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/GeonorgeDatasets.exe
            dist/GeonorgeDatasetsSetup.exe
          generate_release_notes: true
          fail_on_unmatched_files: true
          overwrite_files: true
