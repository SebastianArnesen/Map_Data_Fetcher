[tool.ruff]
line-length = 110
target-version = "py311"
extend-exclude = ["build", "dist", ".venv"]

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "network: live HTTP calls to Geonorge/Kartverket (off by default in CI)",
]

